# filepath: libo.yaml
on: push
permissions:
  contents: write

jobs:
  npm-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-frontend/package-lock.json

      - name: Install & Build
        working-directory: react-frontend
        run: |
          npm ci
          npm run build

      - name: 部署
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: react-frontend/dist